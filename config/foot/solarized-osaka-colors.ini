# color scheme based on craftzdog's solarized-osaka neovim theme
[colors-dark]
# Solarized Osaka Core
background=00141a
foreground=93a1a1

## Normal/Regular colors
regular0=002b36  # black (base02 / highlight bg)
regular1=ff5854  # red (osaka red)
regular2=a1cd5e  # green
regular3=e3b52d  # yellow
regular4=268bd2  # blue
regular5=f3509a  # magenta
regular6=2aa198  # cyan
regular7=eee8d5  # white

## Bright colors
bright0=000a0e   # bright black (darker bg)
bright1=ff5854   # bright red
bright2=586e75   # bright green (base01)
bright3=657b83   # bright yellow (base00)
bright4=839496   # bright blue (base0)
bright5=6c71c4   # bright magenta (violet)
bright6=93a1a1   # bright cyan (base1)
bright7=fdf6e3   # bright white (base3)

## Selection & Misc
selection-foreground=93a1a1
selection-background=073642
urls=268bd2

