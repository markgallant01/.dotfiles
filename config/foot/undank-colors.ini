# this is a straight up copy of the dank-colors.ini colors with the section
# name changed from [colors-dark] to [colors]. Foot 1.25 wants it to be
# named [colors] but 1.26, which DMS expects, wants [colors-dark]. DMS kept
# changing the name back on the auto-generated dank-colors.ini theme. So
# this is the workaround until we get on 1.26.
[colors]
foreground=e6e0e9
background=141218
selection-foreground=e6e0e9
selection-background=4f378b
cursor = 141218 d0bcff

regular0=141218
regular1=ff728f
regular2=7fff9a
regular3=ffda72
regular4=bca5f2
regular5=4e3d76
regular6=D0BCFF
regular7=f4efff
bright0=9d99a5
bright1=ff9fb2
bright2=a5ffb8
bright3=ffe7a5
bright4=d7c6ff
bright5=ded0ff
bright6=e9e0ff
bright7=faf8ff

dim-blend-towards=black
